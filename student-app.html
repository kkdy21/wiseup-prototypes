<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WISEUP 학생앱</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Pretendard Variable','Apple SD Gothic Neo',-apple-system,sans-serif;background:#F5F7FA;max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
button{font-family:inherit;cursor:pointer;border:none;outline:none;background:none;}

/* ── Top Bar ── */
.top-bar{padding:14px 16px 0;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:18px;font-weight:900;letter-spacing:-0.04em;}
.logo .w{color:#1B1F26;}.logo .u{color:#0084FF;}
.avatar{width:32px;height:32px;border-radius:10px;background:#E6E9EF;display:flex;align-items:center;justify-content:center;font-size:14px;}

/* ── Content ── */
.content{padding:16px 16px 80px;min-height:calc(100vh - 100px);}
.tab-content{display:none;}.tab-content.active{display:block;}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #E6E9EF;display:flex;padding:8px 0 env(safe-area-inset-bottom, 12px);z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;position:relative;}
.nav-item .icon{font-size:18px;position:relative;}
.nav-item .badge{position:absolute;top:-4px;right:-8px;width:14px;height:14px;border-radius:7px;background:#E25544;color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.nav-item .label{font-size:10px;font-weight:500;color:#9DA2AA;}
.nav-item.active .label{font-weight:700;color:#0084FF;}
.nav-item.active::before{content:'';position:absolute;top:-8px;width:20px;height:3px;border-radius:2px;background:#0084FF;}

/* ── Common ── */
.section-title{font-size:18px;font-weight:800;color:#121314;margin-bottom:16px;}
.card{background:#fff;border-radius:16px;border:1px solid #E6E9EF;}

/* ── Day Tabs (our style) ── */
.day-tabs{display:flex;gap:4px;margin-bottom:14px;}
.day-tab{padding:7px 0;flex:1;min-width:0;border-radius:10px;font-size:13px;font-weight:500;background:#fff;color:#9DA2AA;display:flex;flex-direction:column;align-items:center;gap:2px;box-shadow:0 1px 2px rgba(0,0,0,0.04);transition:all .15s;}
.day-tab.sel{background:#0084FF;color:#fff;font-weight:800;box-shadow:0 2px 8px rgba(0,132,255,0.25);}
.day-tab.sat{color:#0084FF;}.day-tab.sun{color:#E25544;}
.day-tab.sel.sat,.day-tab.sel.sun{color:#fff;}
.day-tab .cnt{font-size:7px;font-weight:700;font-family:monospace;color:#C0C5CC;}
.day-tab.sel .cnt{color:rgba(255,255,255,0.6);}

/* ── Schedule Cards ── */
.attend-row{display:flex;gap:8px;margin-bottom:12px;}
.attend-card{flex:1;padding:10px 12px;background:#fff;border-radius:12px;border:1px solid #D6DAE2;}
.attend-card .lbl{font-size:9px;font-weight:600;color:#9DA2AA;margin-bottom:2px;}
.attend-card .val{font-size:14px;font-weight:800;color:#121314;font-family:monospace;}
.attend-card .val .arr{color:#C0C5CC;font-size:10px;}
.study-card{min-width:85px;padding:10px 12px;background:linear-gradient(135deg,#005FA3,#0084FF);border-radius:12px;}
.study-card .lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,0.5);margin-bottom:2px;}
.study-card .val{font-size:16px;font-weight:900;color:#fff;font-family:monospace;}
.time-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;gap:2px;margin-bottom:4px;}
.time-bar .cls{background:linear-gradient(90deg,#005FA3,#0084FF);border-radius:3px;}
.time-bar .self{background:#D6DAE2;border-radius:3px;}
.time-legend{display:flex;gap:10px;margin-bottom:16px;}
.time-legend span{display:flex;align-items:center;gap:3px;font-size:9px;color:#7D848C;}
.time-legend .dot{width:5px;height:5px;border-radius:2px;}

/* ── Class List ── */
.class-list{display:flex;flex-direction:column;gap:6px;}
.gap-label{text-align:center;font-size:10px;color:#9DA2AA;padding:4px 0;}
.class-card{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #E6E9EF;}
.class-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.class-info{display:flex;align-items:center;gap:8px;}
.sbadge{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;flex-shrink:0;}
.class-name{font-size:13px;font-weight:700;color:#121314;}
.class-teacher{font-size:10px;color:#9DA2AA;margin-top:1px;}
.class-dur{padding:2px 8px;border-radius:6px;font-size:9px;font-weight:700;}
.class-meta{display:flex;gap:12px;padding-left:38px;}
.class-meta span{font-size:10px;color:#9DA2AA;}
.class-meta .time{font-family:monospace;}
.empty-msg{text-align:center;padding:36px 20px;color:#C0C5CC;font-size:13px;}

/* ── Attendance ── */
.qr-area{padding:24px 20px;margin-bottom:16px;text-align:center;}
.qr-msg{font-size:12px;color:#9DA2AA;margin-bottom:12px;font-weight:500;}
.qr-btn{width:120px;height:120px;border-radius:50%;margin:0 auto 16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .3s;}
.qr-btn.off{background:#F5F7FA;border:3px dashed #D6DAE2;}
.qr-btn.on{background:linear-gradient(135deg,#005FA3,#0084FF);border:none;box-shadow:0 4px 20px rgba(0,132,255,0.25);}
.qr-btn .emoji{font-size:32px;margin-bottom:4px;}
.qr-btn .hint{font-size:11px;color:#9DA2AA;font-weight:600;}
.qr-btn .timer-lbl{font-size:10px;color:rgba(255,255,255,0.7);margin-bottom:4px;}
.qr-btn .timer-val{font-size:24px;font-weight:900;color:#fff;font-family:monospace;}
.checkout-btn{padding:10px 28px;border-radius:10px;font-size:13px;font-weight:700;background:#FEF1EE;color:#E25544;}
.week-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.week-total{font-size:12px;font-weight:800;color:#0084FF;font-family:monospace;}
.bar-chart{display:flex;gap:4px;align-items:flex-end;height:100px;margin-bottom:12px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-col .bar-val{font-size:8px;color:#9DA2AA;font-family:monospace;font-weight:600;}
.bar-col .bar{width:100%;border-radius:4px;transition:height .3s;}
.bar-col .bar.filled{background:linear-gradient(180deg,#0084FF,#005FA3);}
.bar-col .bar.empty{background:#E6E9EF;}
.bar-col .bar-day{font-size:10px;font-weight:600;color:#9DA2AA;}
.bar-col .bar-day.active{color:#121314;}
.goal-box{padding:10px 12px;background:#F5F7FA;border-radius:10px;}
.goal-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.goal-row .gl{font-size:10px;color:#7D848C;font-weight:600;}
.goal-row .gp{font-size:10px;color:#0084FF;font-weight:700;}
.goal-track{height:6px;background:#D6DAE2;border-radius:3px;overflow:hidden;}
.goal-fill{height:100%;background:linear-gradient(90deg,#005FA3,#0084FF);border-radius:3px;}

/* ── Notice ── */
.notice-list{display:flex;flex-direction:column;gap:8px;}
.notice-item{background:#fff;border-radius:14px;padding:14px 16px;cursor:pointer;}
.notice-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.notice-tag{padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;}
.notice-dot{width:6px;height:6px;border-radius:50%;background:#E25544;}
.notice-date{font-size:10px;color:#9DA2AA;margin-left:auto;}
.notice-title{font-size:13px;font-weight:700;color:#121314;line-height:1.3;}
.notice-author{font-size:11px;color:#9DA2AA;margin-top:4px;}
.notice-detail .back-btn{font-size:13px;color:#7D848C;font-weight:600;padding:0;margin-bottom:16px;}
.notice-detail .nd-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.notice-detail .nd-tag{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;}
.notice-detail .nd-date{font-size:11px;color:#9DA2AA;}
.notice-detail .nd-title{font-size:16px;font-weight:800;color:#121314;margin-bottom:12px;line-height:1.4;}
.notice-detail .nd-body{font-size:13px;color:#525860;line-height:1.7;}
.notice-detail .nd-footer{margin-top:16px;padding-top:12px;border-top:1px solid #E6E9EF;font-size:11px;color:#9DA2AA;}

/* ── Homework ── */
.hw-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.hw-remain{font-size:12px;color:#9DA2AA;}
.hw-progress{margin-bottom:16px;}
.hw-prow{display:flex;justify-content:space-between;margin-bottom:4px;}
.hw-prow .pl{font-size:10px;color:#7D848C;font-weight:600;}
.hw-prow .pv{font-size:10px;color:#0084FF;font-weight:700;}
.hw-track{height:6px;background:#E6E9EF;border-radius:3px;overflow:hidden;}
.hw-fill{height:100%;background:linear-gradient(90deg,#1A8F58,#22A368);border-radius:3px;transition:width .4s;}
.hw-section-title{font-size:11px;font-weight:700;color:#7D848C;margin-bottom:8px;}
.hw-section-title.done{color:#9DA2AA;}
.hw-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
.hw-list.done-list{gap:4px;margin-bottom:0;}
.hw-item{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #E6E9EF;display:flex;align-items:center;gap:10px;}
.hw-item.done{background:#F5F7FA;border:none;opacity:0.7;}
.hw-check{width:22px;height:22px;border-radius:6px;border:2px solid #D6DAE2;cursor:pointer;flex-shrink:0;}
.hw-check.checked{background:#22A368;border:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;}
.hw-body{flex:1;min-width:0;}
.hw-meta{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.hw-sdot{width:6px;height:6px;border-radius:2px;}
.hw-subj{font-size:10px;font-weight:600;}
.hw-due{font-size:9px;color:#7D848C;font-weight:600;margin-left:auto;}
.hw-title{font-size:12px;font-weight:600;color:#121314;}
.hw-title.struck{color:#7D848C;text-decoration:line-through;}
.hw-sub{font-size:10px;color:#9DA2AA;}
</style>
</head>
<body>

<div class="top-bar">
  <span class="logo"><span class="w">WISE</span><span class="u">UP</span></span>
  <div class="avatar">👤</div>
</div>

<div class="content">
  <div id="tab-schedule" class="tab-content active"></div>
  <div id="tab-attendance" class="tab-content"></div>
  <div id="tab-notice" class="tab-content"></div>
  <div id="tab-homework" class="tab-content"></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" data-tab="schedule"><div class="icon">📅</div><span class="label">시간표</span></div>
  <div class="nav-item" data-tab="attendance"><div class="icon">📲</div><span class="label">출결</span></div>
  <div class="nav-item" data-tab="notice"><div class="icon">📢<div class="badge">2</div></div><span class="label">공지</span></div>
  <div class="nav-item" data-tab="homework"><div class="icon">📝</div><span class="label">숙제</span></div>
</div>

<script>
var DAYS=["월","화","수","목","금","토","일"];
var SUBJECTS={"영어":{color:"#E25544",bg:"#FEF1EE",gradient:"linear-gradient(135deg,#E25544,#EF7A6B)",label:"EN"},"수학":{color:"#0084FF",bg:"#EBF6FF",gradient:"linear-gradient(135deg,#005FA3,#0084FF)",label:"수"},"국어":{color:"#22A368",bg:"#EDFBF3",gradient:"linear-gradient(135deg,#1A8F58,#22A368)",label:"국"},"WISEUP":{color:"#005FA3",bg:"#D1E5FD",gradient:"linear-gradient(135deg,#005FA3,#3982CB)",label:"W"}};
function getSt(n){var k=Object.keys(SUBJECTS);for(var i=0;i<k.length;i++){if(n.includes(k[i]))return SUBJECTS[k[i]];}return{color:"#7D848C",bg:"#F5F7FA",gradient:"linear-gradient(135deg,#7D848C,#9DA2AA)",label:"?"};}

var CLASSES=[{day:0,name:"영어 동형모의고사",start:"17:30",end:"19:00",room:"1강의실"},{day:0,name:"수학 동형모의고사",start:"19:00",end:"20:30",room:"1강의실"},{day:0,name:"국어 동형모의고사",start:"20:30",end:"22:00",room:"1강의실"},{day:2,name:"수학",start:"17:30",end:"19:00",room:"1강의실",teacher:"허은솔"},{day:2,name:"수학",start:"19:00",end:"20:30",room:"1강의실",teacher:"정보강"},{day:2,name:"수학",start:"20:30",end:"22:00",room:"1강의실",teacher:"허은솔"},{day:3,name:"영어",start:"17:30",end:"19:00",room:"1강의실",teacher:"정주현"},{day:3,name:"수학",start:"20:30",end:"22:00",room:"1강의실",teacher:"김제민"},{day:4,name:"WISEUP",start:"19:00",end:"20:30",room:"1강의실",teacher:"장현명 원장님"},{day:4,name:"국어",start:"20:30",end:"22:00",room:"2강의실"},{day:5,name:"영어",start:"09:30",end:"11:00",room:"1강의실",teacher:"정주현"},{day:5,name:"수학",start:"13:30",end:"15:00",room:"1강의실",teacher:"정보강"},{day:5,name:"국어",start:"15:00",end:"16:30",room:"2강의실"},{day:6,name:"영어단어 끝장관리",start:"13:30",end:"15:00",room:"자습실"}];
var SELF_STUDY=[{day:1,start:"09:00",end:"22:00"},{day:2,start:"09:00",end:"22:00"},{day:3,start:"09:00",end:"22:00"},{day:4,start:"09:00",end:"22:00"},{day:5,start:"09:00",end:"22:00"},{day:6,start:"09:00",end:"22:00"}];
var NOTICES=[{id:1,type:"change",title:"3/5(수) 수학 휴강 안내",body:"허은솔 선생님 개인 사정으로 17:30 수학 수업이 휴강됩니다. 보강 일정은 추후 공지합니다.",author:"허은솔",date:"03/02",isNew:true},{id:2,type:"notice",title:"3월 모의고사 일정 변경",body:"3/8(토)에서 3/15(토)로 변경되었습니다. 시험 범위는 기존과 동일합니다.",author:"장현명 원장님",date:"03/01",isNew:true},{id:3,type:"notice",title:"자습실 이용 규칙 안내",body:"자습실 내 음식물 반입이 금지됩니다. 음료만 가능합니다.",author:"장현명 원장님",date:"02/28",isNew:false}];
var homeworkData=[{id:1,subject:"영어",title:"단어장 Day 15~17 암기",due:"03/03",done:false},{id:2,subject:"수학",title:"수학의 정석 p.142~148",due:"03/05",done:false},{id:3,subject:"수학",title:"오답노트 정리 (2월 모의고사)",due:"03/04",done:true},{id:4,subject:"국어",title:"비문학 지문 3개 풀기",due:"03/06",done:false},{id:5,subject:"영어",title:"독해 워크북 Unit 8",due:"03/07",done:false}];

function t2m(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function fmtD(m){var h=Math.floor(m/60),r=m%60;if(h>0&&r>0)return h+"h "+r+"m";if(h>0)return h+"h";return r+"m";}
function findSS(d){for(var i=0;i<SELF_STUDY.length;i++){if(SELF_STUDY[i].day===d)return SELF_STUDY[i];}return null;}
function getStats(d){var ss=findSS(d),cls=CLASSES.filter(function(c){return c.day===d;}),ta=ss?t2m(ss.end)-t2m(ss.start):0,tc=0;cls.forEach(function(c){tc+=t2m(c.end)-t2m(c.start);});return{ta:ta,tc:tc,ts:Math.max(0,ta-tc),cc:cls.length};}

var currentDay=(function(){var d=new Date().getDay();return d===0?6:d-1;})();
var checkedIn=false;

/* ═══ Navigation ═══ */
document.querySelectorAll('.nav-item').forEach(function(item){
  item.addEventListener('click',function(){
    document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
    item.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active');});
    document.getElementById('tab-'+item.dataset.tab).classList.add('active');
  });
});

/* ═══ Schedule Tab ═══ */
function renderSchedule(){
  var cls=CLASSES.filter(function(c){return c.day===currentDay;}).sort(function(a,b){return t2m(a.start)-t2m(b.start);});
  var ss=findSS(currentDay), stats=getStats(currentDay);
  var h='<div class="section-title">시간표</div>';
  
  // Day tabs
  h+='<div class="day-tabs">';
  for(var i=0;i<7;i++){
    var sel=i===currentDay, st=getStats(i), extra=i===5?' sat':i===6?' sun':'';
    h+='<button class="day-tab'+(sel?' sel':'')+extra+'" onclick="selectDay('+i+')">';
    h+='<span>'+DAYS[i]+'</span>';
    if(st.cc>0) h+='<div class="cnt">'+st.cc+'수업</div>';
    h+='</button>';
  }
  h+='</div>';
  
  // Commute & study time info
  if(ss){
    h+='<div class="attend-row">';
    h+='<div class="attend-card"><div class="lbl">등원</div><div class="val">'+ss.start+' <span class="arr">→</span> '+ss.end+'</div></div>';
    h+='<div class="study-card"><div class="lbl">순공부</div><div class="val">'+fmtD(stats.ta)+'</div></div>';
    h+='</div>';
    if(stats.ta>0){
      h+='<div class="time-bar">';
      if(stats.tc>0) h+='<div class="cls" style="flex:'+stats.tc+'"></div>';
      if(stats.ts>0) h+='<div class="self" style="flex:'+stats.ts+'"></div>';
      h+='</div>';
      h+='<div class="time-legend">';
      if(stats.tc>0) h+='<span><div class="dot" style="background:#0084FF"></div>수업 '+fmtD(stats.tc)+'</span>';
      if(stats.ts>0) h+='<span><div class="dot" style="background:#C0C5CC"></div>자습 '+fmtD(stats.ts)+'</span>';
      h+='</div>';
    }
  }
  
  // Class list with gap labels
  if(cls.length===0){
    h+='<div class="empty-msg">'+(ss?'오늘은 자습 Day 📖':'스케줄 없음')+'</div>';
  } else {
    h+='<div class="class-list">';
    for(var j=0;j<cls.length;j++){
      var ev=cls[j], st=getSt(ev.name), dur=t2m(ev.end)-t2m(ev.start);
      var gap=j>0?t2m(ev.start)-t2m(cls[j-1].end):0;
      if(gap>0) h+='<div class="gap-label">··· 자습 '+fmtD(gap)+' ···</div>';
      h+='<div class="class-card">';
      h+='<div class="class-top"><div class="class-info">';
      h+='<div class="sbadge" style="background:'+st.gradient+'">'+st.label+'</div>';
      h+='<div><div class="class-name">'+ev.name+'</div>';
      if(ev.teacher) h+='<div class="class-teacher">'+ev.teacher+'</div>';
      h+='</div></div>';
      h+='<div class="class-dur" style="background:'+st.bg+';color:'+st.color+'">'+fmtD(dur)+'</div>';
      h+='</div>';
      h+='<div class="class-meta"><span class="time">⏰ '+ev.start+'–'+ev.end+'</span><span>📍 '+ev.room+'</span></div>';
      h+='</div>';
    }
    h+='</div>';
  }
  document.getElementById('tab-schedule').innerHTML=h;
}
function selectDay(d){currentDay=d;renderSchedule();}

/* ═══ Attendance Tab ═══ */
function renderAttendance(){
  var wr=[{d:"월",h:4.5},{d:"화",h:13},{d:"수",h:0},{d:"목",h:0},{d:"금",h:0},{d:"토",h:0},{d:"일",h:0}];
  var tw=0;wr.forEach(function(r){tw+=r.h;});
  var h='<div class="section-title">출결</div>';
  h+='<div class="card qr-area">';
  h+='<div class="qr-msg">'+(checkedIn?'학원에서 공부 중':'QR 태그를 찍어 등원하세요')+'</div>';
  h+='<div class="qr-btn '+(checkedIn?'on':'off')+'" onclick="toggleCheckIn()">';
  if(checkedIn) h+='<div class="timer-lbl">공부 중</div><div class="timer-val" id="timerVal">0:00</div>';
  else h+='<div class="emoji">📲</div><div class="hint">터치로 테스트</div>';
  h+='</div>';
  if(checkedIn) h+='<button class="checkout-btn" onclick="toggleCheckIn()">하원하기</button>';
  h+='</div>';
  
  h+='<div class="card" style="padding:16px">';
  h+='<div class="week-row"><span style="font-size:13px;font-weight:700;color:#121314">이번 주 출결</span><span class="week-total">'+tw+'h</span></div>';
  h+='<div class="bar-chart">';
  wr.forEach(function(r){
    var barH=r.h>0?Math.max(8,(r.h/13)*80):4;
    h+='<div class="bar-col"><span class="bar-val">'+(r.h>0?r.h+'h':'')+'</span><div class="bar '+(r.h>0?'filled':'empty')+'" style="height:'+barH+'px"></div><span class="bar-day'+(r.h>0?' active':'')+'">'+ r.d+'</span></div>';
  });
  h+='</div>';
  h+='<div class="goal-box"><div class="goal-row"><span class="gl">주간 목표 60h</span><span class="gp">'+Math.round(tw/60*100)+'%</span></div>';
  h+='<div class="goal-track"><div class="goal-fill" style="width:'+Math.min(100,tw/60*100)+'%"></div></div></div>';
  h+='</div>';
  document.getElementById('tab-attendance').innerHTML=h;
  if(checkedIn) startTimer();
}

var timerSec=0,timerInterval=null;
function toggleCheckIn(){
  checkedIn=!checkedIn;
  if(!checkedIn){clearInterval(timerInterval);timerSec=0;}
  renderAttendance();
}
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    timerSec++;
    var m=Math.floor(timerSec/60),s=timerSec%60;
    var el=document.getElementById('timerVal');
    if(el) el.textContent=m+':'+(s<10?'0':'')+s;
  },1000);
}

/* ═══ Notice Tab ═══ */
var noticeSelected=null;
function renderNotice(){
  var typeMap={change:{color:"#E25544",bg:"#FEF1EE",label:"변경"},notice:{color:"#0084FF",bg:"#EBF6FF",label:"공지"}};
  if(noticeSelected!==null){
    var n=null;NOTICES.forEach(function(x){if(x.id===noticeSelected)n=x;});var ts=typeMap[n.type];
    var h='<div class="notice-detail"><button class="back-btn" onclick="noticeBack()">← 목록으로</button>';
    h+='<div class="card" style="padding:20px"><div class="nd-top"><span class="nd-tag" style="background:'+ts.bg+';color:'+ts.color+'">'+ts.label+'</span><span class="nd-date">'+n.date+'</span></div>';
    h+='<div class="nd-title">'+n.title+'</div><div class="nd-body">'+n.body+'</div>';
    h+='<div class="nd-footer">작성자: '+n.author+'</div></div></div>';
    document.getElementById('tab-notice').innerHTML=h;return;
  }
  var h='<div class="section-title">공지사항</div><div class="notice-list">';
  NOTICES.forEach(function(n){
    var ts=typeMap[n.type];
    h+='<div class="notice-item" style="border:1px solid '+(n.isNew?ts.color+'30':'#E6E9EF')+'" onclick="openNotice('+n.id+')">';
    h+='<div class="notice-top"><span class="notice-tag" style="background:'+ts.bg+';color:'+ts.color+'">'+ts.label+'</span>';
    if(n.isNew) h+='<span class="notice-dot"></span>';
    h+='<span class="notice-date">'+n.date+'</span></div>';
    h+='<div class="notice-title">'+n.title+'</div>';
    h+='<div class="notice-author">'+n.author+'</div></div>';
  });
  h+='</div>';
  document.getElementById('tab-notice').innerHTML=h;
}
function openNotice(id){noticeSelected=id;renderNotice();}
function noticeBack(){noticeSelected=null;renderNotice();}

/* ═══ Homework Tab ═══ */
function renderHomework(){
  var pending=homeworkData.filter(function(h){return !h.done;}),done=homeworkData.filter(function(h){return h.done;});
  var pct=Math.round(done.length/homeworkData.length*100);
  var h='<div class="hw-header"><span class="section-title" style="margin:0">숙제</span><span class="hw-remain">'+pending.length+'개 남음</span></div>';
  h+='<div class="hw-progress"><div class="hw-prow"><span class="pl">완료율</span><span class="pv">'+pct+'%</span></div><div class="hw-track"><div class="hw-fill" style="width:'+pct+'%"></div></div></div>';
  if(pending.length>0){
    h+='<div class="hw-section-title">해야 할 것</div><div class="hw-list">';
    pending.forEach(function(hw){
      var st=getSt(hw.subject);
      h+='<div class="hw-item"><div class="hw-check" onclick="toggleHw('+hw.id+')"></div><div class="hw-body">';
      h+='<div class="hw-meta"><div class="hw-sdot" style="background:'+st.color+'"></div><span class="hw-subj" style="color:'+st.color+'">'+hw.subject+'</span><span class="hw-due">'+hw.due+'까지</span></div>';
      h+='<div class="hw-title">'+hw.title+'</div></div></div>';
    });
    h+='</div>';
  }
  if(done.length>0){
    h+='<div class="hw-section-title done">완료 ✓</div><div class="hw-list done-list">';
    done.forEach(function(hw){
      h+='<div class="hw-item done"><div class="hw-check checked" onclick="toggleHw('+hw.id+')">✓</div><div class="hw-body">';
      h+='<div class="hw-title struck">'+hw.title+'</div><div class="hw-sub">'+hw.subject+'</div></div></div>';
    });
    h+='</div>';
  }
  document.getElementById('tab-homework').innerHTML=h;
}
function toggleHw(id){homeworkData.forEach(function(h){if(h.id===id)h.done=!h.done;});renderHomework();}

/* ═══ Init ═══ */
renderSchedule();renderAttendance();renderNotice();renderHomework();
</script>
</body>
