<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiseUp - UI Prototypes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-4xl mx-auto py-12 px-4">

    <div class="grid gap-4">
      <a href="student-app.html" class="block bg-white rounded-lg border border-gray-200 p-6 hover:border-blue-300 hover:shadow-md transition-all">

          <div>

      </a>

        <div class="flex items-center justify-between">
          <div>
            <h3 class="font-bold text-lg text-gray-800">Tablet Check-in Kiosk</h3>
