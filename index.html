<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiseUp - UI Prototypes</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:#F5F7FA;min-height:100vh;}
    .container{max-width:600px;margin:0 auto;padding:40px 20px;}
    h1{font-size:24px;font-weight:900;color:#121314;margin-bottom:4px;}
    h1 .u{color:#0084FF;}
    .sub{font-size:13px;color:#9DA2AA;margin-bottom:32px;}
    .grid{display:flex;flex-direction:column;gap:12px;}
    a{text-decoration:none;}
    .item{background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #E6E9EF;transition:all .15s;}
    .item:hover{border-color:#0084FF;box-shadow:0 2px 12px rgba(0,132,255,0.1);}
    .item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
    .item-title{font-size:16px;font-weight:800;color:#121314;}
    .tag{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;}
    .tag.mobile{background:#EBF6FF;color:#0084FF;}
    .tag.tablet{background:#EDFBF3;color:#22A368;}
    .item-desc{font-size:12px;color:#7D848C;line-height:1.5;}
  </style>
</head>
<body>
  <div class="container">
    <h1>WISE<span class="u">UP</span> Prototypes</h1>
    <p class="sub">UI prototype gallery</p>
    <div class="grid">
      <a href="student-app.html">
        <div class="item">
          <div class="item-top">
            <span class="item-title">Student App</span>
            <span class="tag mobile">Mobile</span>
          </div>
          <div class="item-desc">v3 · 시간표, 출결(QR), 공지, 숙제</div>
        </div>
      </a>
      <a href="tablet-checkin.html">
        <div class="item">
          <div class="item-top">
            <span class="item-title">Tablet Check-in Kiosk</span>
            <span class="tag tablet">Tablet</span>
          </div>
          <div class="item-desc">v1 · 강의 출석(PIN), 자습실 입퇴실</div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
